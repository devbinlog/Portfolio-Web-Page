name: Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v3
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
      - run: pnpm install
      - run: cd packages/types && pnpm exec tsc --noEmit
      - run: cd packages/utils && pnpm exec tsc --noEmit

  # Vercel은 GitHub 연동 후 자동 배포
  # Railway는 GitHub 연동 후 자동 배포
  notify:
    name: Deploy Triggered
    runs-on: ubuntu-latest
    needs: typecheck
    if: github.ref == 'refs/heads/main'
    steps:
      - run: echo "main push → Vercel + Railway 자동 배포 시작"
